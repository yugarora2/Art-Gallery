    <style>
      .gallery {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin: 50px;
      }
  
      .art-card {
        width: 260px;
        background: #fff8e7;
        padding: 15px;
        border-radius: 12px;
        box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        text-align: center;
        transition: 0.3s;
      }
  
      .art-card img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 10px;
      }
  
      .art-card p {
        margin-top: 10px;
        font-weight: bold;
        color: black;
      }
  
      .art-card:hover {
        transform: scale(1.05);
        background: #ffe4b5;
      }
      </style>
